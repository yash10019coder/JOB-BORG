<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}JobBorg{% endblock %}</title>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 820px; margin: 2rem auto; padding: 0 1rem; color: #1a1a1a; }
        nav { display: flex; gap: 1rem; align-items: center; border-bottom: 1px solid #ddd; padding-bottom: .75rem; margin-bottom: 1.5rem; }
        nav .brand { font-weight: 700; font-size: 1.1rem; }
        nav .spacer { flex: 1; }
        .card { border: 1px solid #e2e2e2; border-radius: 8px; padding: 1rem 1.25rem; margin-bottom: 1rem; }
        .tag { display: inline-block; background: #eef2ff; color: #3730a3; border-radius: 12px; padding: .1rem .6rem; font-size: .8rem; margin: .1rem .2rem .1rem 0; }
        .muted { color: #666; font-size: .9rem; }
        button, .btn { cursor: pointer; border: 1px solid #ccc; background: #f7f7f7; border-radius: 6px; padding: .35rem .7rem; font-size: .9rem; }
        form.actions { display: inline; }
        label { display: block; margin-top: .75rem; font-weight: 600; }
        input[type=text], input[type=number], input[type=search], select, textarea { width: 100%; padding: .4rem; margin-top: .2rem; box-sizing: border-box; }
        .errorlist { color: #b00020; list-style: none; padding: 0; }
        .score { font-weight: 700; }
    </style>
</head>
<body>
    <nav>
        <span class="brand">JobBorg</span>
        {% if user.is_authenticated %}
            <a href="{% url 'recommendations' %}">Recommendations</a>
            <a href="{% url 'profile' %}">Profile</a>
            <span class="spacer"></span>
            <span class="muted">{{ user.username }}</span>
            <form class="actions" method="post" action="{% url 'logout' %}">
                {% csrf_token %}<button type="submit">Log out</button>
            </form>
        {% else %}
            <span class="spacer"></span>
            <a href="{% url 'login' %}">Log in</a>
            <a href="{% url 'signup' %}">Sign up</a>
        {% endif %}
    </nav>
    {% block content %}{% endblock %}
</body>
</html>
