{% extends "base.html" %}
{% block title %}Sign up — JobBorg{% endblock %}
{% block content %}
<h1>Create your account</h1>
<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Sign up</button>
</form>
<p class="muted">Already have an account? <a href="{% url 'login' %}">Log in</a>.</p>
{% endblock %}
