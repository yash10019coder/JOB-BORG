{% extends "base.html" %}
{% block title %}Log in — JobBorg{% endblock %}
{% block content %}
<h1>Log in</h1>
<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Log in</button>
</form>
<p class="muted">No account? <a href="{% url 'signup' %}">Sign up</a>.</p>
{% endblock %}
